<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <title>过早客</title>
  </head>
  <body>
    <div class="user-page">
      <div class="profile container-box">
        <div class="ui-header">
          <a href="/u/sample-user">
            <img src="/static/avatar/sample.png" alt="" class="avatar" />
          </a>
          <div class="username">sample-user</div>
          <div class="display-name">示例用户</div>
          <div class="user-number">
            <div class="number">过早客第12345号成员</div>
            <div class="since">入住于2022-08-19</div>
          </div>
        </div>
        <div class="ui-content">
          <dl>
            <dt>ID</dt>
            <dd>sample-user</dd>
          </dl>
          <dl>
            <dt>简介</dt>
            <dd>长期关注投资与房产。</dd>
          </dl>
          <dl>
            <dt>个人主页</dt>
            <dd><a href="https://example.com">https://example.com</a></dd>
          </dl>
        </div>
      </div>
    </div>
    <div class="usercard container-box">
      <div class="ui-content">
        <div class="status status-topic">
          <strong><a href="/u/sample-user/topics">8</a></strong> 主题
        </div>
        <div class="status status-reply">
          <strong><a href="/u/sample-user/replies">12</a></strong> 回复
        </div>
        <div class="status status-favorite">
          <strong><a href="/u/sample-user/favorites">2</a></strong> 收藏
        </div>
      </div>
    </div>
  </body>
</html>
